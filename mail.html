<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mail versturen</title>

  assets/style.css

  <!-- EmailJS -->
  https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js
</head>

<body>
  <div class="page">
    <div class="card fade-in">

      <h1 class="title">📧 Mail versturen</h1>
      <p class="subtitle">Stuur een bericht — het komt rechtstreeks in MatteoDesigns Dashboard.</p>

      <div id="alert" class="alert" style="display:none;"></div>

      <form id="mailForm" class="form">

        <div class="input-group">
          <label>de e‑mail</label>
          <input type="email" id="email" required placeholder="naam@voorbeeld.com">
        </div>

        <div class="input-group">
          <label>Onderwerp</label>
          <input type="text" id="subject" required placeholder="Onderwerp van je bericht">
        </div>

        <div class="input-group">
          <label>Bericht</label>
          <textarea id="message" rows="7" required placeholder="Typ je bericht..."></textarea>
        </div>

        <button class="btn-primary">Versturen</button>
        <button class="btn-primary">Naar Dashboard</button>
      </form>

      <div class="footer-link">
        <a href="dashboard.html">📊 Naar dashboard</a>
      </div>

    </div>
  </div>

  <scriptscript>
  assets/app.js</script>
</body>
</html>
</html>
